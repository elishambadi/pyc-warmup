{% extends 'base.html' %}

{% block title %}Page Not Found — PYC WarmUp{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex flex-col items-center justify-center text-center px-4">
    <div class="mb-6 text-pyc-purple">
        <i class="fas fa-music text-7xl opacity-30"></i>
    </div>
    <h1 class="text-8xl font-extrabold text-pyc-purple mb-2">404</h1>
    <h2 class="text-2xl font-bold text-pyc-text mb-3">Hmm, this page is off-key.</h2>
    <p class="text-pyc-text/60 max-w-md mb-8">
        We couldn't find what you were looking for. It may have been moved, deleted, or never existed.
    </p>
    <div class="flex flex-wrap gap-4 justify-center">
        <a href="{% url 'home' %}"
           class="px-6 py-3 bg-pyc-purple text-white rounded-lg font-semibold hover:bg-pyc-purple/90 transition-colors flex items-center gap-2">
            <i class="fas fa-home"></i> Go Home
        </a>
        <a href="{% url 'song_list' %}"
           class="px-6 py-3 bg-white border border-pyc-purple text-pyc-purple rounded-lg font-semibold hover:bg-pyc-purple/5 transition-colors flex items-center gap-2">
            <i class="fas fa-music"></i> Browse Songs
        </a>
    </div>
</div>
{% endblock %}
